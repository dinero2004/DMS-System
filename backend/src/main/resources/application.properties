spring.application.name=dms-backend
# No Postgres? Run with profile "demo" (embedded H2): mvn spring-boot:run -Dspring-boot.run.profiles=demo
spring.datasource.url=jdbc:postgresql://localhost:5432/dms
spring.datasource.username=dms
spring.datasource.password=dms
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false

# Set to true to load demo clients, vehicles, jobs, sales, and invoices on startup (PostgreSQL).
dms.seed.enabled=false

# SPA login (session cookie). Override in production.
dms.auth.username=demo
dms.auth.password=demo
