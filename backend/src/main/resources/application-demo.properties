# Local demo: no PostgreSQL or Docker required.
# Run: mvn spring-boot:run -Dspring-boot.run.profiles=demo
# Data file: ~/.dms-h2/dms.mv.db (survives restarts; delete folder to reset)
spring.datasource.url=jdbc:h2:file:${user.home}/.dms-h2/dms;AUTO_SERVER=TRUE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# One-time demo dataset (skipped if seed client id already exists)
dms.seed.enabled=true

dms.auth.username=demo
dms.auth.password=demo
